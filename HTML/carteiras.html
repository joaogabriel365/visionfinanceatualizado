<div class="section-header-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding: 0 10px;">
    <div class="section-title-block wallet-section-title">
        <h2 style="color: var(--text-primary); font-size: 24px; font-weight: 700; margin: 0;">Carteiras e Métodos de Pagamento</h2>
        <p class="section-support-text">Gerencie seus cartões, contas e vales em um só lugar.</p>
    </div>
    <button class="btn btn-primary wallet-primary-action" id="btnNewWallet" onclick="window.CarteirasModulo.abrirModalNova()">
        <i class="fas fa-plus"></i>
        <span>Nova Carteira</span>
    </button>
</div>

<div id="walletsGrid" class="wallets-grid">
</div>

<div id="walletModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
    <div class="modal-content-card wallet-modal-card" style="background: var(--modal-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 35px; width: 100%; max-width: 400px;">
        <h3 id="walletModalTitle" style="color: var(--text-primary); text-align: center; margin-bottom: 25px; font-size: 22px; font-weight: 700;">Nova Carteira</h3>
        <form id="walletForm" class="wallet-modal-form">
            <input type="hidden" id="editWalletIndex" value="-1">
            <input type="hidden" id="walletColor" value="#1e293b">

            <div class="wallet-form-group" style="margin-bottom: 15px;">
                <label style="color: var(--text-secondary); display: block; margin-bottom: 8px; font-size: 14px;">Nome da carteira</label>
                <input type="text" id="walletName" placeholder="Ex: Nubank" required class="input">
            </div>
            
            <div class="wallet-form-group" style="margin-bottom: 15px;">
                <label style="color: var(--text-secondary); display: block; margin-bottom: 8px; font-size: 14px;">Tipo</label>
                <select id="walletType" required class="select">
                    <option value="Cartão de Crédito">Cartão de Crédito</option>
                    <option value="Cartão de Débito">Cartão de Débito</option>
                    <option value="Vale Alimentação">VA</option>
                    <option value="Vale Refeição">VR</option>
                    <option value="Vale Transporte">VT</option>
                </select>
            </div>

            <div id="limitContainer" class="wallet-form-group" style="margin-bottom: 15px;">
                <label id="labelLimit" style="color: var(--text-secondary); display: block; margin-bottom: 8px; font-size: 14px;">Limite</label>
                <input type="text" id="walletLimit" placeholder="R$ 0,00" required class="input">
                
                <div id="unlimitedBox" class="wallet-limit-toggle" style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                    <input type="checkbox" id="isUnlimited" style="width: 18px; height: 18px; cursor: pointer;">
                    <label for="isUnlimited" style="color: var(--text-secondary); font-size: 13px; cursor: pointer;">Cartão sem limite / Sem Limite</label>
                </div>
            </div>

            <div class="wallet-form-group" style="margin-bottom: 25px;">
                <label style="color: var(--text-secondary); display: block; margin-bottom: 10px; font-size: 14px;">Cor do Cartão</label>
                <div id="colorPickerContainer" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;">
                </div>
            </div>

            <div class="wallet-form-actions" style="display: flex; flex-direction: column; gap: 10px;">
                <button type="submit" class="btn btn-primary">Salvar Carteira</button>
                <button type="button" onclick="window.CarteirasModulo.fecharModal()" class="btn btn-secondary">Cancelar</button>
            </div>
        </form>
    </div>
</div>
