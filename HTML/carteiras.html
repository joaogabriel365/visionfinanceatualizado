<div class="section-header-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
    <div>
        <h2 style="color: white; font-size: 24px; font-weight: 700; margin-bottom: 5px;">Carteiras e Métodos de Pagamento</h2>
        <p style="color: #94a3b8; font-size: 14px;">Gerencie seus cartões, contas e vales em um só lugar.</p>
    </div>
    <button class="btn-primary" id="btnNewWallet" onclick="document.getElementById('walletModal').style.display = 'flex'" style="background: #22d3ee; color: #0f172a; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 8px;">
        <i class="fas fa-plus"></i> Nova Carteira
    </button>
</div>

<div class="wallets-grid" id="walletsGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;">
    <div id="empty-wallet-state" class="empty-state" style="grid-column: 1/-1; text-align: center; padding: 60px; border: 2px dashed #1e293b; border-radius: 20px;">
        <div style="font-size: 40px; margin-bottom: 15px;">💳</div>
        <h3 style="color: white; margin-bottom: 10px;">Nenhuma carteira por aqui... ainda!</h3>
        <p style="color: #94a3b8;">Adicione um cartão ou carteira para assumir o controle dos seus gastos.</p>
    </div>
</div>

<div id="walletModal" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
    <div class="modal-content-card" style="background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 35px; width: 100%; max-width: 400px; position: relative;">
        <h3 style="color: white; text-align: center; margin-bottom: 25px; font-size: 22px; font-weight: 700;">Nova Carteira</h3>
        
        <form id="walletForm">
            <div style="margin-bottom: 20px;">
                <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Nome da carteira</label>
                <input type="text" id="walletName" placeholder="Ex: Nubank Crédito" required 
                    style="width: 100%; background: #1a253a; border: 1px solid #2e405a; border-radius: 8px; padding: 12px; color: white; outline: none;">
            </div>

            <div style="margin-bottom: 20px;">
                <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Tipo</label>
                <select id="walletType" required 
                    style="width: 100%; background: #1a253a; border: 1px solid #2e405a; border-radius: 8px; padding: 12px; color: #a5f3fc; outline: none; cursor: pointer;">
                    <option value="Cartão de Crédito">Cartão de Crédito</option>
                    <option value="Cartão de Débito">Cartão de Débito</option>
                    <option value="Conta Corrente">Conta Corrente</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Vale Refeição">Vale Refeição</option>
                </select>
            </div>

            <div style="margin-bottom: 30px;">
                <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Limite mensal</label>
                <input type="number" id="walletLimit" step="0.01" placeholder="0.00" required 
                    style="width: 100%; background: #1a253a; border: 1px solid #2e405a; border-radius: 8px; padding: 12px; color: white; outline: none;">
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button type="submit" style="background: #22d3ee; color: #0f172a; border: none; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s;">
                    Salvar Carteira
                </button>
                <button type="button" onclick="document.getElementById('walletModal').style.display = 'none'" 
                    style="background: transparent; color: #94a3b8; border: none; padding: 10px; cursor: pointer; font-size: 14px;">
                    Cancelar
                </button>
            </div>
        </form>
    </div>
</div>
