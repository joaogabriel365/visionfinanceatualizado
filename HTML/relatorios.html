<div class="filter-container" style="display: flex; gap: 10px; margin-bottom: 30px;">
    <select id="reportMonth" class="custom-select">
        <option value="03">Março</option>
        <option value="02">Fevereiro</option>
    </select>
    <select id="reportYear" class="custom-select">
        <option value="2026">2026</option>
    </select>
</div>

<div class="reports-main-layout" style="display: grid; grid-template-columns: 1fr 350px; gap: 20px; margin-bottom: 25px;">
    
    <div class="chart-card-large" style="background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 25px; display: flex; flex-direction: column;">
        <h3 style="color: white; margin: 0; font-size: 1.1rem; font-weight: 700;">Comparativo Mensal por Categoria</h3>
        <p style="color: #94a3b8; font-size: 0.85rem; margin: 6px 0 25px 0;">Março vs Fevereiro 2026</p>
        
        <div style="flex-grow: 1; min-height: 350px; position: relative;">
            <canvas id="comparisonChart"></canvas>
        </div>
    </div>

    <aside class="reports-sidebar" style="background: #0f172a; border: 1px solid #1e293b; border-radius: 16px; padding: 25px;">
        <h3 style="color: white; margin-bottom: 25px; font-size: 1.1rem; font-weight: 700;">Resumo do Período</h3>
        
        <div id="resumoPeriodoContainer" style="display: flex; flex-direction: column; gap: 12px;">
        </div>
    </aside>
</div>

<div class="ranking-card-premium">
    <div class="ranking-header">
        <div class="header-info">
            <h3>Ranking de Maiores Gastos</h3>
            <p>Os maiores gastos individuais do período</p>
        </div>
        <div class="header-badge">Top 5</div>
    </div>

    <div id="rankingGastosContainer" class="ranking-list-container">
        </div>
</div>
