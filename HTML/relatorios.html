<div class="filter-container">
    <div class="filter-actions">
        <div class="filter-group">
            <label>Ano:</label>
            <select id="reportYear" class="custom-select">
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
                <option value="2027">2027</option>
            </select>
        </div>
        <div class="reports-filter-note">Visão anual consolidada com comparativo mensal e destaques do período.</div>
        <!-- Botões de mostrar/ocultar todos os meses removidos -->
    </div>
</div>

<div class="reports-main-layout">
    <div class="chart-card-large">
        <h3 class="report-main-title">Comparativo Mensal por Categoria</h3>
        <div class="reports-chart-container">
            <canvas id="comparisonChart"></canvas>
        </div>
        <!-- Botões de meses removidos -->
    </div>

    <aside class="reports-sidebar">
        <div class="report-card-header">
            <div>
                <p class="report-eyebrow">Leitura rápida</p>
                <h3>Resumo do Período</h3>
            </div>
        </div>
        <div id="resumoPeriodoContainer" class="resumo-list"></div>
    </aside>
</div>

<div class="ranking-card-premium">
    <div class="ranking-header">
        <div class="header-info">
            <h3>Ranking de Maiores Gastos</h3>
            <p>Os maiores gastos individuais do período</p>
        </div>
        <div class="header-badge">Top 5</div>
    </div>

    <div id="rankingGastosContainer" class="ranking-list-container">
        </div>
</div>
