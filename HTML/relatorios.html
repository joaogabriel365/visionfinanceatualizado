<div class="filter-container" style="display: grid; gap: 15px; margin-bottom: 30px;">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <label style="font-weight: 700; color: #1f2937;">Ano:</label>
            <select id="reportYear" class="custom-select" style="min-width: 130px;">
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
                <option value="2027">2027</option>
            </select>
        </div>
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <button id="toggleAllMonths" type="button" class="btn btn-small" style="background: #22d3ee; color: #ffffff;">Selecionar Todos</button>
            <button id="clearAllMonths" type="button" class="btn btn-small" style="background: #ef4444; color: #ffffff;">Limpar seleção</button>
        </div>
    </div>
    <div id="monthFilterContainer" style="display: flex; flex-wrap: wrap; gap: 10px;">
        <!-- Checkboxes de meses serão adicionados dinamicamente pelo JS -->
    </div>
</div>

<div class="reports-main-layout" style="display: grid; grid-template-columns: 1fr 350px; gap: 20px; margin-bottom: 25px;">
    
    <div class="chart-card-large" style="background: #e0e0e0; border: 1px solid #c0c0c0; border-radius: 16px; padding: 25px; display: flex; flex-direction: column;">
        <h3 style="color: #1f2937; margin: 0; font-size: 1.1rem; font-weight: 700;">Comparativo Mensal por Categoria</h3>
        
        <div style="flex-grow: 1; min-height: 350px; position: relative;">
            <canvas id="comparisonChart"></canvas>
        </div>
    </div>

    <aside class="reports-sidebar" style="background: #e0e0e0; border: 1px solid #c0c0c0; border-radius: 16px; padding: 25px;">
        <h3 style="color: #1f2937; margin-bottom: 25px; font-size: 1.1rem; font-weight: 700;">Resumo do Período</h3>
        
        <div id="resumoPeriodoContainer" style="display: flex; flex-direction: column; gap: 12px;">
        </div>
    </aside>
</div>

<div class="ranking-card-premium">
    <div class="ranking-header">
        <div class="header-info">
            <h3>Ranking de Maiores Gastos</h3>
            <p>Os maiores gastos individuais do período</p>
        </div>
        <div class="header-badge">Top 5</div>
    </div>

    <div id="rankingGastosContainer" class="ranking-list-container">
        </div>
</div>
