<div class="config-container">
    <h1 class="page-title">Configurações</h1>

    <div class="perfil-card">
        <h3 class="card-subtitle">Preferências do Sistema</h3>
        
        <form id="formConfiguracoes">
            <div class="form-group">
                <label for="selectMoeda">Moeda Principal</label>
                <select id="selectMoeda" class="config-select">
                    <option value="BRL">R$ - Real Brasileiro</option>
                    <option value="USD">$ - Dólar Americano</option>
                    <option value="EUR">€ - Euro</option>
                    <option value="GBP">£ - Libra Esterlina</option>
                </select>
            </div>

            <hr class="divider">

            <div class="config-section">
                <div class="config-item">
                    <div class="config-info">
                        <strong>Modo Escuro</strong>
                        <span>Usar tema escuro como padrão</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="checkTemaEscuro" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <hr class="divider">

            <div class="config-section">
                <h4 class="section-inner-title">Notificações</h4>
                
                <div class="config-item">
                    <div class="config-info">
                        <strong>Ativar Notificações</strong>
                        <span>Permitir alertas do sistema no navegador</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="checkNotificacoesGeral">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="config-item sub-item">
                    <div class="config-info">
                        <strong>Alertas de Orçamento</strong>
                        <span>Notificar ao se aproximar do limite</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="checkAlertaOrcamento">
                        <span class="slider"></span>
                    </label>
                </div>

                <div class="config-item sub-item">
                    <div class="config-info">
                        <strong>Lembretes de Metas</strong>
                        <span>Ser notificado sobre prazos das metas</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="checkLembreteMetas">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-accent-blue">Salvar Configurações</button>
            </div>
        </form>
    </div>
</div>
