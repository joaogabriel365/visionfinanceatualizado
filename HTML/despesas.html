<div class="section-header-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
    <h2 style="color: white; font-size: 24px; font-weight: 700;">Gerenciar Despesas</h2>
    <button class="btn-primary" onclick="DespesasModulo.abrirModal()" style="background: #22d3ee; color: #0f172a; border: none; padding: 12px 24px; border-radius: 10px; font-weight: 800; cursor: pointer; transition: 0.2s;">
        + Nova Despesa
    </button>
</div>

<div class="filters-bar" style="display: flex; gap: 15px; margin-bottom: 25px;">
    <select id="filterMonth" class="dark-input dark-select" style="max-width: 150px;">
        <option value="todos">📅 Mês</option>
        <option value="01">Janeiro</option>
        <option value="02">Fevereiro</option>
        <option value="03">Março</option>
        <option value="04">Abril</option>
        <option value="05">Maio</option>
        <option value="06">Junho</option>
        <option value="07">Julho</option>
        <option value="08">Agosto</option>
        <option value="09">Setembro</option>
        <option value="10">Outubro</option>
        <option value="11">Novembro</option>
        <option value="12">Dezembro</option>
    </select>
    
    <select id="filterCategory" class="dark-input dark-select" style="max-width: 180px;">
        <option value="todos">Categoria</option>
        <option value="Alimentação">Alimentação</option>
        <option value="Transporte">Transporte</option>
        <option value="Lazer">Lazer</option>
        <option value="Saúde">Saúde</option>
        <option value="Moradia">Moradia</option>
    </select>

    <select id="filterPayment" class="dark-input dark-select" style="max-width: 180px;">
        <option value="todos">Pagamento</option>
        <option value="Cartão de Crédito">Crédito</option>
        <option value="Cartão de Débito">Débito</option>
        <option value="Dinheiro">Dinheiro</option>
        <option value="VR">VR</option>
        <option value="VA">VA</option>
    </select>
</div>

<div class="table-card" style="background: #0f172a; border-radius: 16px; padding: 10px; border: 1px solid #1e293b; overflow: hidden;">
    <table style="width: 100%; border-collapse: collapse; color: #94a3b8;">
        <thead>
            <tr style="text-align: left; border-bottom: 1px solid #1e293b;">
                <th style="padding: 20px; color: white; font-weight: 600;">Título</th>
                <th style="padding: 20px; color: white; font-weight: 600;">Categoria</th>
                <th style="padding: 20px; color: white; font-weight: 600;">Pagamento</th>
                <th style="padding: 20px; color: white; font-weight: 600;">Valor</th>
                <th style="padding: 20px; color: white; font-weight: 600;">Data</th>
                <th style="padding: 20px; color: white; font-weight: 600;">Descrição</th>
                <th style="padding: 20px; color: white; font-weight: 600; text-align: center;">Ações</th>
            </tr>
        </thead>
        <tbody id="fullExpenseTableBody">
            </tbody>
    </table>
</div>

<div id="modalDespesa" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="modal-content-card" style="background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 30px; width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
        <h3 id="modalTitle" style="color: white; text-align: center; margin-bottom: 25px; font-size: 22px; font-weight: 700;">Nova Despesa</h3>
        
        <form id="formDespesa">
            <input type="hidden" id="editIndex" value="-1">
            
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Título da despesa</label>
                <input type="text" id="titulo" placeholder="Ex: Supermercado" required class="dark-input">
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Valor</label>
                <input type="number" id="valor" step="0.01" placeholder="R$ 0,00" required class="dark-input">
            </div>

            <div class="form-row" style="display: flex; gap: 15px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Categoria</label>
                    <select id="categoria" required class="dark-input dark-select">
                        <option value="">Selecione</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Transporte">Transporte</option>
                        <option value="Lazer">Lazer</option>
                        <option value="Saúde">Saúde</option>
                        <option value="Moradia">Moradia</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Método</label>
                    <select id="metodo" required class="dark-input dark-select">
                        <option value="">Selecione</option>
                        <option value="Cartão de Crédito">Crédito</option>
                        <option value="Cartão de Débito">Débito</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="VR">VR</option>
                        <option value="VA">VA</option>
                    </select>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Data</label>
                <input type="date" id="data" required class="dark-input">
            </div>

            <div class="form-group" style="margin-bottom: 25px;">
                <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Descrição</label>
                <textarea id="observacao" placeholder="Observações adicionais..." rows="3" class="dark-input" style="resize: none;"></textarea>
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button type="submit" class="btn-save-full" style="background: #22d3ee; color: #0f172a; border: none; padding: 14px; border-radius: 12px; font-weight: 800; font-size: 16px; cursor: pointer; transition: 0.2s;">
                    Salvar Despesa
                </button>
                <button type="button" onclick="DespesasModulo.fecharModal()" style="background: transparent; color: #94a3b8; border: none; padding: 10px; cursor: pointer; font-size: 14px; font-weight: 500;">
                    Cancelar
                </button>
            </div>
        </form>
    </div>
</div>

<div id="modalConfirmacao" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1100; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div style="background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 35px; width: 100%; max-width: 340px; text-align: center;">
        <div style="font-size: 48px; margin-bottom: 15px;">⚠️</div>
        <h3 style="color: white; margin-bottom: 10px; font-size: 20px; font-weight: 700;">Excluir Despesa?</h3>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 25px; line-height: 1.5;">Esta ação não pode ser desfeita. Deseja continuar?</p>
        <div style="display: flex; gap: 12px;">
            <button id="btnConfirmarExclusao" style="flex: 1; background: #ef4444; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer;">Excluir</button>
            <button onclick="document.getElementById('modalConfirmacao').style.display='none'" style="flex: 1; background: #334155; color: white; border: none; padding: 12px; border-radius: 10px; font-weight: 700; cursor: pointer;">Voltar</button>
        </div>
    </div>
</div>
