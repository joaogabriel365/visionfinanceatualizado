<div class="section-header-row" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
    <h2 style="color: #1f2937; font-size: 24px; font-weight: 700;">Gerenciar Despesas</h2>
    <button class="btn btn-primary" onclick="DespesasModulo.abrirModal()">
        + Nova Despesa
    </button>
</div>

<div class="filters-bar" style="display: flex; gap: 15px; margin-bottom: 25px;">
    <select id="filterMonth" class="filter-select">
        <option value="todos">📅 Mês</option>
        <option value="01">Janeiro</option>
        <option value="02">Fevereiro</option>
        <option value="03">Março</option>
        <option value="04">Abril</option>
        <option value="05">Maio</option>
        <option value="06">Junho</option>
        <option value="07">Julho</option>
        <option value="08">Agosto</option>
        <option value="09">Setembro</option>
        <option value="10">Outubro</option>
        <option value="11">Novembro</option>
        <option value="12">Dezembro</option>
    </select>
    
    <select id="filterCategory" class="filter-select">
    <option value="todos">Categoria</option>
    <option value="Alimentação">Alimentação</option>
    <option value="Transporte">Transporte</option>
    <option value="Lazer">Lazer</option>
    <option value="Saúde">Saúde</option>
    <option value="Moradia">Moradia</option>
    <option value="Moda">Moda</option> <option value="Outros">Outros</option> </select>

    <select id="filterPayment" class="filter-select">
        <option value="todos">Pagamento</option>
        <option value="Cartão de Crédito">Crédito</option>
        <option value="Cartão de Débito">Débito</option>
        <option value="Pix">Pix</option>
        <option value="Dinheiro">Dinheiro</option>
        <option value="VR">VR</option>
        <option value="VA">VA</option>
    </select>

    <select id="filterPeriod" class="filter-select">
        <option value="todos">Período (Dias)</option>
        <option value="5">Últimos 5 dias</option>
        <option value="10">Últimos 10 dias</option>
        <option value="15">Últimos 15 dias</option>
        <option value="20">Últimos 20 dias</option>
        <option value="30">Últimos 30 dias</option>
    </select>
</div>

<div class="table-card" style="background: #0f172a; border-radius: 16px; padding: 10px; border: 1px solid #1e293b; overflow: hidden;">
    <table style="width: 100%; border-collapse: collapse; color: #FFFFFF;"> <thead>
            <tr style="text-align: left; border-bottom: 1px solid #1e293b;">
                <th style="padding: 20px; color: #1f2937; font-weight: 600;">Título</th>
                <th class="categoria-header" style="padding: 20px; color: #1f2937; font-weight: 600;">Categoria</th>
                <th style="padding: 20px; color: #1f2937; font-weight: 600;">Pagamento</th>
                <th style="padding: 20px; color: #1f2937; font-weight: 600;">Valor</th>
                <th style="padding: 20px; color: #1f2937; font-weight: 600;">Data</th>
                <th style="padding: 20px; color: #1f2937; font-weight: 600; text-align: center;">Descrição</th>
                <th style="padding: 20px; color: #1f2937; font-weight: 600; text-align: center;">Ações</th>
            </tr>
        </thead>
        <tbody id="fullExpenseTableBody"></tbody>
    </table>
</div>

<div id="modalDespesa" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div class="modal-content-card" style="background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 30px; width: 100%; max-width: 450px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
        <h3 id="modalTitle" style="color: #1f2937; text-align: center; margin-bottom: 25px; font-size: 22px; font-weight: 700;">Nova Despesa</h3>
        <form id="formDespesa">
            <input type="hidden" id="editIndex" value="-1">
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Título da despesa</label>
                <input type="text" id="titulo" placeholder="Ex: Supermercado" required class="dark-input" style="color: #1f2937;">
            </div>
            <div class="form-group" style="margin-bottom: 15px;">
                <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Valor</label>
                <input type="text" id="valor" placeholder="R$ 0,00" required class="dark-input" style="color: #1f2937;">
            </div>
            <div class="form-row" style="display: flex; gap: 15px; margin-bottom: 15px;">
                <div style="flex: 1;">
                    <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Categoria</label>
                    <select id="categoria" required class="dark-input dark-select" style="color: #1f2937;">
                        <option value="">Selecione</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Transporte">Transporte</option>
                        <option value="Lazer">Lazer</option>
                        <option value="Saúde">Saúde</option>
                        <option value="Moradia">Moradia</option>
                        <option value="Moda">Moda</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Método</label>
                    <select id="metodo" required class="dark-input dark-select" onchange="DespesasModulo.verificarMetodoPagamento()" style="color: #1f2937;">
                        <option value="">Selecione</option>
                        <option value="Cartão de Crédito">Crédito</option>
                        <option value="Cartão de Débito">Débito</option>
                        <option value="Pix">Pix</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="VR">VR</option>
                        <option value="VA">VA</option>
                    </select>
                </div>
            </div>

            <div id="containerCartao" style="display: none; margin-bottom: 15px; background: rgba(255, 255, 255, 0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1);">
                <div style="display: flex; gap: 12px; align-items: flex-end;">
                    <div style="flex: 1.5;">
                        <label style="color: #94a3b8; display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;">Cartão</label>
                        <select id="cartaoSelecionado" class="dark-input dark-select" style="font-weight: 700; color: #22d3ee; border-color: rgba(34, 211, 238, 0.2);">
                        </select>
                    </div>
                    
                    <div id="containerParcelamento" style="display: none; flex: 1; border-left: 1px solid rgba(255, 255, 255, 0.1); padding-left: 12px;">
                        <label style="color: #94a3b8; display: block; margin-bottom: 6px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;">Parcelas</label>
                        <div style="display: flex; gap: 8px;">
                            <select id="foiParcelado" class="dark-input dark-select" style="font-size: 12px; padding: 8px; color: #1f2937;" onchange="DespesasModulo.toggleSeletorParcelas()">
                                <option value="nao">1x</option>
                                <option value="sim">Parc.</option>
                            </select>
                            <select id="numParcelas" class="dark-input dark-select" style="display: none; font-size: 12px; padding: 8px; color: #22d3ee;">
                                <option value="2x">2x</option><option value="3x">3x</option><option value="4x">4x</option><option value="5x">5x</option><option value="6x">6x</option><option value="7x">7x</option><option value="8x">8x</option><option value="9x">9x</option><option value="10x">10x</option><option value="11x">11x</option><option value="12x">12x</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div id="avisoCartaoInexistente" style="display: none; margin-bottom: 15px; padding: 15px; background: rgba(239, 68, 68, 0.1); border-radius: 12px; border: 1px solid rgba(239, 68, 68, 0.2);">
                <p style="color: #f87171; font-size: 13px; margin-bottom: 10px; line-height: 1.4;">
                    Você não possui um cartão <span id="tipoCartaoMsg" style="font-weight: 800;"></span> cadastrado. Deseja cadastrar agora?
                </p>
                <div style="display: flex; gap: 10px;">
                    <button type="button" onclick="DespesasModulo.redirecionarParaCarteira()" class="btn btn-success">Sim</button>
                    <button type="button" onclick="document.getElementById('avisoCartaoInexistente').style.display='none'" class="btn btn-secondary">Não</button>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 15px;">
                <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Data</label>
                <input type="text" id="data" placeholder="dd/mm/aaaa" required class="dark-input" style="color: #1f2937;">
            </div>
            <div class="form-group" style="margin-bottom: 25px;">
                <label style="color: #94a3b8; display: block; margin-bottom: 8px; font-size: 14px;">Descrição</label>
                <textarea id="observacao" placeholder="Observações adicionais..." rows="3" class="dark-input" style="resize: none; color: white;"></textarea>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button type="submit" class="btn btn-primary">Salvar Despesa</button>
                <button type="button" onclick="DespesasModulo.fecharModal()" class="btn btn-secondary">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<div id="modalConfirmacao" class="modal-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1100; align-items: center; justify-content: center; backdrop-filter: blur(4px);">
    <div style="background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 35px; width: 100%; max-width: 340px; text-align: center;">
        <div style="font-size: 48px; margin-bottom: 15px;">⚠️</div>
        <h3 style="color: white; margin-bottom: 10px; font-size: 20px; font-weight: 700;">Excluir Despesa?</h3>
        <p style="color: #94a3b8; font-size: 14px; margin-bottom: 25px; line-height: 1.5;">Esta ação não pode ser desfeita. Deseja continuar?</p>
        <div style="display: flex; gap: 12px;">
            <button id="btnConfirmarExclusao" class="btn btn-danger">Excluir</button>
            <button onclick="document.getElementById('modalConfirmacao').style.display='none'" class="btn btn-secondary">Voltar</button>
        </div>
    </div>
</div>
