<div class="dashboard-top-cards">
    <div class="stat-card small-card">
        <div class="stat-info">
            <p>Total Gasto</p>
            <h3 id="totalGastoText">R$ 0,00</h3>
        </div>
    </div>
    <div class="stat-card small-card">
        <div class="stat-info">
            <p>Limite Mensal</p>
            <h3 id="limiteText">R$ 0,00</h3>
        </div>
    </div>
    <div class="stat-card small-card">
        <div class="stat-info">
            <p>Saldo Restante</p>
            <h3 id="saldoText">R$ 0,00</h3>
        </div>
    </div>
    <div class="stat-card small-card">
        <div class="stat-info">
            <p>Pagamento mais usado</p>
            <h3 id="metodoPrincipalText">---</h3>
        </div>
    </div>
</div>

<div class="charts-grid">
    <div class="chart-card">
        <h3>Gastos por Categoria</h3>
        <div class="chart-container">
            <canvas id="categoryChart"></canvas>
        </div>
    </div>
    <div class="chart-card">
        <h3>Gastos por Método de Pagamento</h3>
        <div class="chart-container">
            <canvas id="paymentChart"></canvas>
        </div>
    </div>
</div>

<div class="table-card recent-expenses-card">
    <div class="table-header-flex">
        <h3>Despesas Recentes</h3>
        <span id="dataAtualBadge" class="date-badge"></span>
    </div>
    <table class="dash-table recent-expenses-table">
        <thead>
            <tr>
                <th>Título</th>
                <th>Categoria</th>
                <th>Pagamento</th>
                <th>Valor</th>
                <th>Data</th>
            </tr>
        </thead>
        <tbody id="expenseTableBody"></tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script type="module" src="../js/main.js"></script>

</body>
</html>
