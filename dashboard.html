<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Painel do Vision Finance para acompanhar despesas, carteiras, relatórios e configurações em um só lugar.">
    <meta name="theme-color" content="#084ca0">
    <meta name="color-scheme" content="light dark">
    <meta name="format-detection" content="telephone=no, email=no, address=no">
    <title>Vision Finance - Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css"> 
    <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body class="dashboard-body">
    <a href="#dashboard-main" class="skip-link">Pular para o conteúdo principal</a>
    <noscript>
        <div class="noscript-banner">Ative o JavaScript para usar a navegação dinâmica, os gráficos e a alternância de tema do dashboard.</div>
    </noscript>
    <div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>
    <aside class="sidebar" aria-label="Barra lateral principal">
        <div class="sidebar-header">
            <img src="./img/logo.png" alt="Logo" class="sidebar-logo">
            <span class="logo-text">Vision Finance</span>
        </div>
        <nav class="sidebar-nav" id="sidebarNavigation" aria-label="Seções do dashboard">
            <a href="#" class="nav-item active" data-section="painel">Painel</a>
            <a href="#" class="nav-item" data-section="despesas">Despesas</a>
            <a href="#" class="nav-item" data-section="carteiras">Carteiras</a>
            <a href="#" class="nav-item" data-section="planejamento">Planejamento</a>
            <a href="#" class="nav-item" data-section="relatorios">Relatórios</a>
            <a href="#" class="nav-item" data-section="perfil">Perfil</a>
            <a href="#" class="nav-item" data-section="configuracoes">Configurações</a> 
        </nav>
        <div class="sidebar-footer">
            <a href="index.html" class="logout">Sair</a>
        </div>
    </aside>

    <main class="main-content" id="dashboard-main" tabindex="-1">
        <header class="dash-header">
            <div class="dash-header-main">
                <button class="sidebar-toggle" id="sidebarToggle" type="button" aria-label="Abrir menu" aria-expanded="false" aria-controls="sidebarNavigation">
                    <span></span>
                    <span></span>
                    <span></span>
                </button>
                <h1 id="sectionTitle">Painel</h1>
            </div>
            <div class="user-info">
                <button class="notification-btn" type="button" aria-label="Notificações">🔔</button>
                <div class="user-profile"><div class="avatar-circle">JS</div></div>
            </div>
        </header>

        <div id="dynamic-content"></div>
    </main>

    <div id="confirmModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--modal-overlay); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
        <div style="background: var(--modal-bg); border: 1px solid var(--border-color); border-radius: 20px; padding: 35px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
            <div id="confirmModalIconWrap" style="width: 72px; height: 72px; background: rgba(239, 68, 68, 0.14); border: 1px solid rgba(239, 68, 68, 0.32); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 22px; box-shadow: 0 12px 28px rgba(239, 68, 68, 0.18);">
                <img id="confirmModalIcon" src="./img/lixeira.png" alt="Excluir" style="width: 28px; height: 28px; filter: brightness(0) saturate(100%) invert(27%) sepia(98%) saturate(3518%) hue-rotate(343deg) brightness(100%) contrast(101%);">
            </div>
            <h3 id="confirmModalTitle" style="color: var(--text-primary); margin-bottom: 12px; font-size: 20px; font-weight: 800;">Confirmar Exclusão</h3>
            <p id="confirmModalMessage" style="color: var(--text-secondary); font-size: 15px; font-weight: 600; line-height: 1.6; margin-bottom: 30px;">Esta ação não poderá ser desfeita. Você tem certeza que deseja remover este item?</p>
            <div style="display: flex; gap: 12px;">
                <button id="btnConfirmCancel" style="flex: 1; background: var(--bg-surface); color: var(--text-primary); border: 1px solid var(--border-color); padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s;">Cancelar</button>
                <button id="btnConfirmDelete" style="flex: 1; background: var(--danger); color: #ffffff; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s;">Excluir</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/dashboard.bundle.js"></script>
</body>
</html>
