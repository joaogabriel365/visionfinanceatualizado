<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Finance - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="dashboard.css">
    <head>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="dashboard.css">
</head>
</head>
<body class="dashboard-body">

    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="unnamed.png" alt="Logo" class="sidebar-logo">
            <span class="logo-text">Vision Finance</span>
        </div>
        
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" id="nav-painel" onclick="showSection('painel')">Painel</a>
            <a href="#" class="nav-item" id="nav-despesas" onclick="showSection('despesas')">Despesas</a>
            <a href="#" class="nav-item" id="nav-carteiras" onclick="showSection('carteiras')">Carteiras</a>
            <a href="#" class="nav-item">Planejamento</a>
            <a href="#" class="nav-item">Relatórios</a>
            <a href="#" class="nav-item">Perfil</a>
            <a href="#" class="nav-item">Configurações</a>
        </nav>

        <div class="sidebar-footer">
            <a href="index.html" class="nav-item logout">Sair</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="dash-header">
            <h1 id="sectionTitle">Painel</h1>
            <div class="user-info">
                <button class="notification-btn">🔔</button>
                <div class="user-profile">
                    <div class="avatar-circle">JS</div>
                </div>
            </div>
        </header>

        <div id="section-painel" class="content-section active">
            <section class="stats-grid">
                </section>

            <section class="charts-grid">
                <div class="chart-card">
                    <h3>Gastos por Categoria</h3>
                    <div class="chart-container">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>
                <div class="chart-card">
                    <h3>Gastos por Método de Pagamento</h3>
                    <div class="chart-container">
                        <canvas id="methodChart"></canvas>
                    </div>
                </div>
            </section>

            <section class="table-card">
                <h3>Despesas Recentes</h3>
                <table class="dash-table">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Categoria</th>
                            <th>Pagamento</th>
                            <th>Valor</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody id="expenseTableBody">
                        </tbody>
                </table>
            </section>
        </div>

        <div id="section-carteiras" class="content-section" style="display: none;">
            <div class="section-header-row">
                <h2>Carteiras e Métodos de Pagamento</h2>
                <button class="btn-primary" id="btnNewWallet">+ Nova Carteira</button>
            </div>

            <div class="wallets-grid" id="walletsGrid">
                </div>
        </div>
    </main>

    <div class="modal-overlay" id="walletModal">
        <div class="modal-box">
            <h3>Nova Carteira</h3>
            <form id="walletForm">
                <div class="input-group">
                    <label>Nome da carteira</label>
                    <input type="text" id="walletName" placeholder="Ex: Nubank Crédito" required>
                </div>
                <div class="input-group">
                    <label>Tipo</label>
                    <select id="walletType" required>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                        <option value="Cartão de Débito">Cartão de Débito</option>
                        <option value="VR">VR</option>
                        <option value="VA">VA</option>
                        <option value="Dinheiro">Dinheiro</option>
                    </select>
                </div>
                <div class="input-group" style="margin-top: 15px;">
                    <label>Limite mensal</label>
                    <input type="number" id="walletLimit" placeholder="0,00" required>
                </div>
                <div class="modal-actions" style="margin-top: 25px;">
                    <button type="submit" class="btn-save">Salvar Carteira</button>
                    <button type="button" class="btn-cancel" id="closeWallet">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
