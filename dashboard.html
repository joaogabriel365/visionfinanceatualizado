<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Finance - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css"> 
    <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body class="dashboard-body">
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="./img/logo.png" alt="Logo" class="sidebar-logo">
            <span class="logo-text">Vision Finance</span>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-section="painel">Painel</a>
            <a href="#" class="nav-item" data-section="despesas">Despesas</a>
            <a href="#" class="nav-item" data-section="carteiras">Carteiras</a>
            <a href="#" class="nav-item" data-section="planejamento">Planejamento</a>
            <a href="#" class="nav-item" data-section="relatorios">Relatórios</a>
            <a href="#" class="nav-item" data-section="perfil">Perfil</a>
            <a href="#" class="nav-item" data-section="configuracoes">Configurações</a> 
        </nav>
        <div class="sidebar-footer">
            <a href="index.html" class="nav-item logout"><i class="fas fa-sign-out-alt"></i> Sair</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="dash-header">
            <h1 id="sectionTitle">Painel</h1>
            <div class="user-info">
                <button class="notification-btn">🔔</button>
                <div class="user-profile"><div class="avatar-circle">JS</div></div>
            </div>
        </header>

        <div id="dynamic-content"></div>
    </main>

    <div id="confirmModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(5px);">
        <div style="background: #0f172a; border: 1px solid #1e293b; border-radius: 20px; padding: 35px; width: 100%; max-width: 380px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);">
            <div style="width: 60px; height: 60px; background: rgba(239, 68, 68, 0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
                <img src="./img/lixeira.png" alt="Alerta" style="width: 24px; height: 24px; filter: brightness(0) invert(1);">
            </div>
            <h3 id="confirmModalTitle" style="color: #1f2937; margin-bottom: 12px; font-size: 20px; font-weight: 700;">Confirmar Exclusão</h3>
            <p id="confirmModalMessage" style="color: #94a3b8; font-size: 14px; line-height: 1.6; margin-bottom: 30px;">Esta ação não poderá ser desfeita. Você tem certeza que deseja remover este item?</p>
            <div style="display: flex; gap: 12px;">
                <button id="btnConfirmCancel" style="flex: 1; background: #1e293b; color: #94a3b8; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s;">Cancelar</button>
                <button id="btnConfirmDelete" style="flex: 1; background: #ef4444; color: white; border: none; padding: 14px; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.2s;">Excluir</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
