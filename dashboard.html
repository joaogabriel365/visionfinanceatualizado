<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vision Finance - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/style.css"> 
    <link rel="stylesheet" href="./css/dashboard.css">
</head>
<body class="dashboard-body">
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="./img/logo.png" alt="Logo" class="sidebar-logo">
            <span class="logo-text">Vision Finance</span>
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active" data-section="painel">Painel</a>
            <a href="#" class="nav-item" data-section="despesas">Despesas</a>
            <a href="#" class="nav-item" data-section="carteiras">Carteiras</a>
            <a href="#" class="nav-item" data-section="planejamento">Planejamento</a>
            <a href="#" class="nav-item" data-section="relatorios">Relatórios</a>
            <a href="#" class="nav-item" data-section="perfil">Perfil</a> 
        </nav>
        <div class="sidebar-footer">
            <a href="index.html" class="nav-item logout">Sair</a>
        </div>
    </aside>

    <main class="main-content">
        <header class="dash-header">
            <h1 id="sectionTitle">Painel</h1>
            <div class="user-info">
                <button class="notification-btn">🔔</button>
                <div class="user-profile"><div class="avatar-circle">JS</div></div>
            </div>
        </header>

        <div id="dynamic-content"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="js/main.js"></script>
</body>
</html>
